<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GAMR1530 JS Ray Tracer</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        canvas { border: 2px solid #555; background: #000; margin-top: 20px; }
        .controls { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>JS Ray Tracer - Spheres</h1>
    <canvas id="renderCanvas" width="800" height="450"></canvas>
    <div class="controls">
        <button onclick="render()">Start Render</button>
        <p id="status">Ready</p>
    </div>
    <script src="raytracer.js"></script>
</body>
</html>
